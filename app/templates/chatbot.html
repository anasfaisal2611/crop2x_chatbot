<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop2X Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chatbot.css') }}">
</head>
<body>
    <div id="chatbot-container" class="chatbot-container">
        <div class="chatbot-header">
            <div class="header-content">
                <h2>🌾 Crop2X Assistant</h2>
                <p>How can we help you?</p>
            </div>
            <button id="minimize-btn" class="minimize-btn">−</button>
        </div>
        
        <div id="chatbot-body" class="chatbot-body">
            <div id="messages-container" class="messages-container">
                <div class="message bot-message">
                    <div class="message-content">
                        <p>👋 Welcome to Crop2X!</p>
                        <p>I'm here to help you with agriculture solutions.</p>
                        <p>Are you a:</p>
                        <div class="quick-replies">
                            <button class="quick-reply" onclick="selectUserType('farmer')">🌱 Farmer</button>
                            <button class="quick-reply" onclick="selectUserType('partner')">🤝 Partner</button>
                            <button class="quick-reply" onclick="selectUserType('enterprise')">🏢 Enterprise</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chatbot-footer">
            <div class="input-group">
                <input 
                    type="text" 
                    id="message-input" 
                    class="message-input" 
                    placeholder="Type your message..."
                    onkeypress="handleKeyPress(event)"
                >
                <button id="send-btn" class="send-btn" onclick="sendMessage()">📤</button>
            </div>
            <p class="footer-note">Powered by Crop2X AI</p>
        </div>
    </div>
    
    <!-- Lead Form Modal -->
    <div id="lead-form-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLeadForm()">&times;</span>
            <h3>Share Your Details</h3>
            <form id="lead-form" onsubmit="submitLeadForm(event)">
                <input type="text" id="lead-name" placeholder="Your Name" required>
                <input type="email" id="lead-email" placeholder="Email Address" required>
                <input type="tel" id="lead-phone" placeholder="Phone Number">
                <input type="text" id="lead-location" placeholder="Location" required>
                <input type="text" id="lead-farm-size" placeholder="Farm Size (optional)">
                <textarea id="lead-message" placeholder="Additional Message" rows="4"></textarea>
                <button type="submit" class="submit-btn">Send</button>
            </form>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
</body>
</html>
