<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop2X Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chatbot.css') }}">
</head>
<body>

    <div id="chatbot-container" class="chatbot-container">
        
        <div id="chat-screen" class="chat-screen" style="display: flex;">
            <div class="chatbot-header">
                <h2>🌾 Crop2X Assistant</h2>
                <button id="minimize-btn" class="minimize-btn">−</button>
            </div>
            
            <div id="chatbot-body" class="chatbot-body">
                <div id="messages-container" class="messages-container">
                    <div class="message bot-message">
                        <p>👋 <strong>Welcome to Crop2X.</strong> I'm your assistant. Ask me about our services, or anything covered in the document your administrator uploaded. How can I help you today?</p>
                    </div>
                </div>
            </div>

            <div class="chatbot-footer">
                <input type="text" id="message-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">📤</button>
                <button onclick="connectWhatsApp()" class="whatsapp-btn">WhatsApp</button>
            </div>
        </div>
    </div>
    
    <div id="lead-form-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('lead-form-modal').style.display='none'">&times;</span>
            <h3>Share Your Details</h3>
            <form id="lead-form" onsubmit="event.preventDefault();">
                <input type="text" id="lead-name" placeholder="Your Name" required>
                <input type="email" id="lead-email" placeholder="Email Address" required>
                <input type="tel" id="lead-phone" placeholder="Phone Number">
                <button type="submit" class="submit-btn">Send</button>
            </form>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
</body>
</html>
